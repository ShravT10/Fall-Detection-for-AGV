version: "3.9"

services:
  floor-detect:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # mount weights so you don't need to rebuild when you retrain
      - ./runs:/app/runs:ro
    environment:
      - MODEL_WEIGHTS=runs/segment/floor_safe_v1/weights/best.pt
      - CONF_THRESHOLD=0.35
      - PORT=8000
    restart: unless-stopped
    
